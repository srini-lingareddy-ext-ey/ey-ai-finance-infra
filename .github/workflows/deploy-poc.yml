# Deploy main.bicep: resource group + Key Vault, App Configuration, optional Azure OpenAI account (no model deployments in Bicep), Postgres, Blob Storage; then optional best-effort OpenAI model deployments from bicep/configs/openai_default_deployments.json; run init.sql; then App Services.
# After App Services deploy: POC storage account network ACLs Deny with allow rules for frontend + backend Web App outbound IPs (plus AzureServices bypass). The deploy-main-resources job resets storage to default Allow before blob seeding so GitHub-hosted runners can upload on the next run.
# Trigger manually and pass pocSlug (and optionally location, frontend/backend images, appChoice). Password and pipeline principal from GitHub secrets.
# Required secrets: AZURE_POC_CLIENT_ID, AZURE_POC_TENANT_ID, AZURE_POC_SUBSCRIPTION_ID, POSTGRES_ADMIN_PASSWORD, MONGO_ADMIN_PASSWORD,
# EY_AI_FINANCE_REPO_TOKEN, ACR_MANAGED_IDENTITY_CLIENT_ID, MICROSOFT_PROVIDER_AUTHENTICATION_APP_ID, MICROSOFT_PROVIDER_AUTHENTICATION_SECRET.
# Validated in job validate-secrets before Azure deploy.
# Microsoft Entra on App Services is always configured for the POC Web Apps (not optional per run).
# Requires MICROSOFT_PROVIDER_AUTHENTICATION_APP_ID, AZURE_POC_TENANT_ID, and MICROSOFT_PROVIDER_AUTHENTICATION_SECRET (Easy Auth / authsettingsV2 on the frontend).
# Register redirect URI (frontend Easy Auth only):
#   https://eyaifinance-<pocSlug>.azurewebsites.net/.auth/login/aad/callback
# Repository secrets only; this job has no environment:.
#
# OIDC note: GitHub’s ID token (client assertion for federated login) is only valid for a few minutes. deploy-main-resources logs in before
# main.bicep, captures outputs, runs azure/login again before Key Vault / storage / App Config. When **createAzureOpenAiResource** is true, run OpenAI model deployments after App Config (refresh login before that segment if you add a dedicated azure/login step).
# For init.sql + optional frontend image build: EY_AI_FINANCE_REPO_TOKEN (checkout ey-ai-finance). For app services: ACR_MANAGED_IDENTITY_CLIENT_ID; POSTGRES_ADMIN_PASSWORD also sets backend POSTGRES_PASSWORD app setting.
# When buildFrontendImage is true, job build-frontend-image runs the same steps as build-push-image.yml (inlined here so OIDC id-token works; reusable workflow_call cannot grant id-token to nested jobs). OIDC identity needs AcrPush.

name: Deploy POC

on:
  workflow_dispatch:
    inputs:
      pocSlug:
        description: "POC identifier (e.g. test-main1). Resource group will be rg-<pocSlug>-poc."
        required: true
        type: string
      location:
        description: "Azure region (e.g. eastus)"
        required: true
        type: string
        default: "eastus"
      appChoice:
        description: "App choice"
        required: true
        type: choice
        options:
          - aifinance-next
          - aifinance
        default: "aifinance-next"
      buildFrontendImage:
        description: "If true, build and push frontend from ey-ai-finance"
        required: true
        type: boolean
        default: true
      frontendImage:
        description: "Optional. Ignored when the build job succeeds (built image is always deployed). Otherwise: if non-empty, used; if empty, DOCKER|creyaifinmain.azurecr.io/<appChoice>-frontend:latest."
        required: false
        type: string
        default: ""
      backendImage:
        description: "Optional. If empty, uses DOCKER|creyaifinmain.azurecr.io/<appChoice>-backend:latest (aifinance-next-backend or aifinance-backend)."
        required: false
        type: string
        default: ""
      createAzureOpenAiResource:
        description: "If true, deploy Azure OpenAI. If false, use existing main account."
        required: true
        type: boolean
        default: false

env:
  AZURE_CLIENT_ID: ${{ secrets.AZURE_POC_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_POC_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_POC_SUBSCRIPTION_ID }}
permissions:
  id-token: write
  contents: read
jobs:
  validate-secrets:
    name: Verify required repository secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check secrets are non-empty
        env:
          AZURE_POC_CLIENT_ID: ${{ secrets.AZURE_POC_CLIENT_ID }}
          AZURE_POC_TENANT_ID: ${{ secrets.AZURE_POC_TENANT_ID }}
          AZURE_POC_SUBSCRIPTION_ID: ${{ secrets.AZURE_POC_SUBSCRIPTION_ID }}
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          MONGO_ADMIN_PASSWORD: ${{ secrets.MONGO_ADMIN_PASSWORD }}
          EY_AI_FINANCE_REPO_TOKEN: ${{ secrets.EY_AI_FINANCE_REPO_TOKEN }}
          ACR_MANAGED_IDENTITY_CLIENT_ID: ${{ secrets.ACR_MANAGED_IDENTITY_CLIENT_ID }}
          MICROSOFT_PROVIDER_AUTHENTICATION_APP_ID: ${{ secrets.MICROSOFT_PROVIDER_AUTHENTICATION_APP_ID }}
          MICROSOFT_PROVIDER_AUTHENTICATION_SECRET: ${{ secrets.MICROSOFT_PROVIDER_AUTHENTICATION_SECRET }}
        run: |
          set -euo pipefail
          missing=()
          [[ -n "${AZURE_POC_CLIENT_ID:-}" ]] || missing+=("AZURE_POC_CLIENT_ID")
          [[ -n "${AZURE_POC_TENANT_ID:-}" ]] || missing+=("AZURE_POC_TENANT_ID")
          [[ -n "${AZURE_POC_SUBSCRIPTION_ID:-}" ]] || missing+=("AZURE_POC_SUBSCRIPTION_ID")
          [[ -n "${POSTGRES_ADMIN_PASSWORD:-}" ]] || missing+=("POSTGRES_ADMIN_PASSWORD")
          [[ -n "${MONGO_ADMIN_PASSWORD:-}" ]] || missing+=("MONGO_ADMIN_PASSWORD")
          [[ -n "${EY_AI_FINANCE_REPO_TOKEN:-}" ]] || missing+=("EY_AI_FINANCE_REPO_TOKEN")
          [[ -n "${ACR_MANAGED_IDENTITY_CLIENT_ID:-}" ]] || missing+=("ACR_MANAGED_IDENTITY_CLIENT_ID")
          [[ -n "${MICROSOFT_PROVIDER_AUTHENTICATION_APP_ID:-}" ]] || missing+=("MICROSOFT_PROVIDER_AUTHENTICATION_APP_ID")
          [[ -n "${MICROSOFT_PROVIDER_AUTHENTICATION_SECRET:-}" ]] || missing+=("MICROSOFT_PROVIDER_AUTHENTICATION_SECRET")
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing or empty repository secrets: ${missing[*]}. Add them under Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Required repository secrets are present (values not logged)."

  deploy-main-resources:
    needs: validate-secrets
    runs-on: ubuntu-latest
    outputs:
      resourceGroupName: ${{ steps.core-outputs.outputs.resourceGroupName }}
      keyVaultName: ${{ steps.core-outputs.outputs.keyVaultName }}
      appConfigEndpoint: ${{ steps.core-outputs.outputs.appConfigEndpoint }}
      appConfigStoreName: ${{ steps.core-outputs.outputs.appConfigStoreName }}
      postgresHost: ${{ steps.core-outputs.outputs.postgresHost }}
      postgresDatabaseName: ${{ steps.core-outputs.outputs.postgresDatabaseName }}
      openaiName: ${{ steps.core-outputs.outputs.openaiName }}
      storageAccountName: ${{ steps.core-outputs.outputs.storageAccountName }}
      mongoHost: ${{ steps.core-outputs.outputs.mongoHost }}
      mongoClusterName: ${{ steps.core-outputs.outputs.mongoClusterName }}
      mongoAdministratorLogin: ${{ steps.core-outputs.outputs.mongoAdministratorLogin }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_POC_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_POC_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_POC_SUBSCRIPTION_ID }}

      - name: Deploy main.bicep (ResourceGroup + Key Vault, App Config, optional OpenAI, Postgres, Mongo, Blob Storage)
        env:
          PG_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          MONGO_PASSWORD: ${{ secrets.MONGO_ADMIN_PASSWORD }}
          DEPLOY_AZURE_OPENAI: ${{ inputs.createAzureOpenAiResource }}
        run: |
          POC_SLUG="${{ inputs.pocSlug }}"
          LOCATION="${{ inputs.location }}"
          MANIFEST="bicep/configs/blob_payloads.json"
          BLOB_CONTAINERS=$(jq -c 'keys' "$MANIFEST")

          az deployment sub create \
            --location "$LOCATION" \
            --name "main-${POC_SLUG}-${{ github.run_number }}" \
            --template-file bicep/main.bicep \
            --parameters \
              pocSlug="$POC_SLUG" \
              location="$LOCATION" \
              administratorLoginPassword="$PG_PASSWORD" \
              mongoAdministratorLoginPassword="$MONGO_PASSWORD" \
              openAIDeployments='[]' \
              pocAppConfigKeyValues='[]' \
              blobContainerNames="$BLOB_CONTAINERS" \
              deployAzureOpenAi="$DEPLOY_AZURE_OPENAI"
      - name: Capture Deployment Outputs
        id: core-outputs
        run: |
          az deployment sub show \
            --name "main-${{ inputs.pocSlug }}-${{ github.run_number }}" \
            --query properties.outputs \
            -o json > core-outputs.json
          echo "resourceGroupName=$(jq -r '.resourceGroupName.value' core-outputs.json)" >> $GITHUB_OUTPUT
          echo "keyVaultName=$(jq -r '.keyVaultName.value' core-outputs.json)" >> $GITHUB_OUTPUT
          echo "appConfigEndpoint=$(jq -r '.appConfigEndpoint.value' core-outputs.json)" >> $GITHUB_OUTPUT
          echo "appConfigStoreName=$(jq -r '.appConfigStoreName.value' core-outputs.json)" >> $GITHUB_OUTPUT
          echo "postgresHost=$(jq -r '.postgresHost.value' core-outputs.json)" >> $GITHUB_OUTPUT
          echo "postgresDatabaseName=$(jq -r '.postgresDatabaseName.value' core-outputs.json)" >> $GITHUB_OUTPUT
          echo "openaiName=$(jq -r '.openaiName.value' core-outputs.json)" >> $GITHUB_OUTPUT
          echo "storageAccountName=$(jq -r '.storageAccountName.value' core-outputs.json)" >> $GITHUB_OUTPUT
          echo "mongoHost=$(jq -r '.mongoHost.value' core-outputs.json)" >> $GITHUB_OUTPUT
          echo "mongoClusterName=$(jq -r '.mongoClusterName.value' core-outputs.json)" >> $GITHUB_OUTPUT
          echo "mongoAdministratorLogin=$(jq -r '.mongoAdministratorLogin.value' core-outputs.json)" >> $GITHUB_OUTPUT

      - name: Azure login (OIDC) — refresh after resources deployment
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_POC_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_POC_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_POC_SUBSCRIPTION_ID }}

      - name: Wait for RBAC Propagation
        run: echo "Waiting 30s for RBAC to propagate..." && sleep 30

      - name: Allow Key Vault access from all networks
        run: |
          RG="${{ steps.core-outputs.outputs.resourceGroupName }}"
          KV="${{ steps.core-outputs.outputs.keyVaultName }}"
          az keyvault update --name "$KV" --resource-group "$RG" --default-action Allow
          echo "Key Vault $KV: default-action set to Allow"

      - name: Populate Key Vault with Secrets
        env:
          PG_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          MONGO_PASSWORD: ${{ secrets.MONGO_ADMIN_PASSWORD }}
          CREATE_AZURE_OPENAI: ${{ inputs.createAzureOpenAiResource }}
        run: |
          RG="${{ steps.core-outputs.outputs.resourceGroupName }}"
          KV="${{ steps.core-outputs.outputs.keyVaultName }}"
          PG_HOST="${{ steps.core-outputs.outputs.postgresHost }}"
          PG_DB="${{ steps.core-outputs.outputs.postgresDatabaseName }}"
          OPENAI_NAME="${{ steps.core-outputs.outputs.openaiName }}"
          MONGO_HOST="${{ steps.core-outputs.outputs.mongoHost }}"
          MONGO_USER="${{ steps.core-outputs.outputs.mongoAdministratorLogin }}"

          PG_CONN="postgresql://citus:${PG_PASSWORD}@${PG_HOST}:5432/${PG_DB}?sslmode=require"
          az keyvault secret set --vault-name "$KV" --name "PostgresConnectionString" --value "$PG_CONN" --output none
          echo "Set PostgresConnectionString in $KV"

          MONGO_PW_ENC=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$MONGO_PASSWORD")
          MONGO_CONN="mongodb+srv://${MONGO_USER}:${MONGO_PW_ENC}@${MONGO_HOST}/?tls=true&authMechanism=SCRAM-SHA-256&retrywrites=false&maxIdleTimeMS=120000&authSource=admin"
          az keyvault secret set --vault-name "$KV" --name "MongoConnectionString" --value "$MONGO_CONN" --output none
          echo "Set MongoConnectionString in $KV"

      - name: Populate MongoDB (eyaifin.chats)
        continue-on-error: true
        env:
          MONGO_PASSWORD: ${{ secrets.MONGO_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          MONGO_HOST="${{ steps.core-outputs.outputs.mongoHost }}"
          MONGO_USER="${{ steps.core-outputs.outputs.mongoAdministratorLogin }}"
          MONGO_PW_ENC=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$MONGO_PASSWORD")
          export MONGO_URI="mongodb+srv://${MONGO_USER}:${MONGO_PW_ENC}@${MONGO_HOST}/?tls=true&authMechanism=SCRAM-SHA-256&retrywrites=false&maxIdleTimeMS=120000&authSource=admin"
          pip install pymongo --quiet
          python3 scripts/seed_mongo_eyaifin.py

      - name: Allow Blob Storage access from all networks
        run: |
          set -euo pipefail
          RG="${{ steps.core-outputs.outputs.resourceGroupName }}"
          SA="${{ steps.core-outputs.outputs.storageAccountName }}"

          az storage account update \
            --resource-group "$RG" \
            --name "$SA" \
            --public-network-access Enabled \
            --default-action Allow \
            --bypass AzureServices

          echo "Waiting for storage network settings to propagate..."
          for i in {1..20}; do
            DEFAULT_ACTION=$(az storage account show --resource-group "$RG" --name "$SA" --query "networkRuleSet.defaultAction" -o tsv || true)
            PUBLIC_ACCESS=$(az storage account show --resource-group "$RG" --name "$SA" --query "publicNetworkAccess" -o tsv || true)
            if [[ "$DEFAULT_ACTION" == "Allow" && "$PUBLIC_ACCESS" == "Enabled" ]]; then
              echo "Storage account $SA: public access Enabled, default network action Allow"
              exit 0
            fi
            if [[ "$i" -eq 20 ]]; then
              echo "Storage network settings did not converge in time."
              exit 1
            fi
            echo "Sleeping 15s (network poll $i/20)..."
            sleep 15
          done

      - name: Populate Blob Storage with payload files (from blob_payloads.json)
        run: |
          set -euo pipefail
          RG="${{ steps.core-outputs.outputs.resourceGroupName }}"
          SA="${{ steps.core-outputs.outputs.storageAccountName }}"
          POC_SLUG="${{ inputs.pocSlug }}"
          MAX_TOTAL_SLEEP=300
          TOTAL_SLEEP=0

          sleep_with_budget() {
            local requested="$1"
            local remaining=$((MAX_TOTAL_SLEEP - TOTAL_SLEEP))
            if (( remaining <= 0 )); then
              echo "Sleep budget exhausted (${MAX_TOTAL_SLEEP}s). Aborting."
              return 1
            fi
            local actual="$requested"
            if (( actual > remaining )); then
              actual="$remaining"
            fi
            echo "Sleeping ${actual}s (budget used: ${TOTAL_SLEEP}s/${MAX_TOTAL_SLEEP}s)"
            sleep "$actual"
            TOTAL_SLEEP=$((TOTAL_SLEEP + actual))
          }

          CONN=$(az storage account show-connection-string --name "$SA" --resource-group "$RG" --query connectionString -o tsv)
          # Validate data-plane reachability before uploading many blobs.
          for i in {1..10}; do
            if az storage container list --connection-string "$CONN" --num-results 1 --output none; then
              echo "Storage data-plane connectivity is ready."
              break
            fi
            if [[ "$i" -eq 10 ]]; then
              echo "Storage data-plane connectivity failed after retries."
              exit 1
            fi
            WAIT=$((i * 10))
            echo "Data-plane not ready yet; retrying in ${WAIT}s..."
            sleep_with_budget "$WAIT" || exit 1
          done

          MANIFEST="bicep/configs/blob_payloads.json"
          python3 scripts/seed_blob_payloads.py \
            --manifest "$MANIFEST" \
            --poc-slug "$POC_SLUG" \
            --config-dir bicep/configs \
            --connection-string "$CONN"
          echo "Seeded blobs from ${MANIFEST} (containers: $(jq -r 'keys | join(", ")' "$MANIFEST"))"

      - name: Populate App Configuration prompts (from backend_configs.yml)
        run: |
          pip install pyyaml --quiet
          python scripts/sync_appconfig_from_yaml.py \
            --config bicep/configs/backend_configs.yml \
            --store "${{ steps.core-outputs.outputs.appConfigStoreName }}" \
            --label "${{ inputs.pocSlug }}"

      - name: Populate App Configuration tenant configs (from tenants blob storage)
        run: |
          python3 scripts/sync_blob_payload_refs_to_appconfig.py \
            --manifest bicep/configs/blob_payloads.json \
            --store "${{ steps.core-outputs.outputs.appConfigStoreName }}" \
            --label "${{ inputs.pocSlug }}" \
            --poc-slug "${{ inputs.pocSlug }}"

      - name: Deploy OpenAI models
        if: ${{ inputs.createAzureOpenAiResource }}
        run: |
          set -euo pipefail
          RG="${{ steps.core-outputs.outputs.resourceGroupName }}"
          OAI="${{ steps.core-outputs.outputs.openaiName }}"
          MANIFEST="bicep/configs/openai_default_deployments.json"
          bash scripts/deploy_openai_deployments.sh "$RG" "$OAI" "$MANIFEST"

      - name: Show Deployment Outputs
        run: |
          echo "resourceGroupName=${{ steps.core-outputs.outputs.resourceGroupName }}"
          echo "keyVaultName=${{ steps.core-outputs.outputs.keyVaultName }}"
          echo "appConfigEndpoint=${{ steps.core-outputs.outputs.appConfigEndpoint }}"
          echo "appConfigStoreName=${{ steps.core-outputs.outputs.appConfigStoreName }}"
          echo "postgresHost=${{ steps.core-outputs.outputs.postgresHost }}"
          echo "postgresDatabaseName=${{ steps.core-outputs.outputs.postgresDatabaseName }}"
          echo "openaiName=${{ steps.core-outputs.outputs.openaiName }}"
          echo "storageAccountName=${{ steps.core-outputs.outputs.storageAccountName }}"
          echo "mongoHost=${{ steps.core-outputs.outputs.mongoHost }}"
          echo "mongoClusterName=${{ steps.core-outputs.outputs.mongoClusterName }}"
          echo "mongoAdministratorLogin=${{ steps.core-outputs.outputs.mongoAdministratorLogin }}"

  init-postgres:
    runs-on: ubuntu-latest
    needs: deploy-main-resources
    permissions:
      contents: read
    steps:
      - name: Checkout ey-ai-finance repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.repository_owner }}/ey-ai-finance
          path: ey-ai-finance
          token: ${{ secrets.EY_AI_FINANCE_REPO_TOKEN }}

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run init.sql on Postgres
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          PGCONNECT_TIMEOUT: "30"
        run: |
          set -euo pipefail

          INIT_SQL="ey-ai-finance/db/${{ inputs.appChoice }}/init.sql"
          PG_HOST="${{ needs.deploy-main-resources.outputs.postgresHost }}"
          PG_DB="${{ needs.deploy-main-resources.outputs.postgresDatabaseName }}"
          WS="${GITHUB_WORKSPACE}"
          APP_CHOICE="${{ inputs.appChoice }}"

          echo "Connecting to: ${PG_HOST}"
          echo "Database: ${PG_DB}"
          echo "Schema: ${APP_CHOICE}"
          echo "Script: ${INIT_SQL}"

          if [[ ! -f "${INIT_SQL}" ]]; then
            echo "Error: ${INIT_SQL} not found"
            exit 1
          fi

          SCHEMA_SRC=""
          for d in \
            "${WS}/ey-ai-finance/schemas" \
            "${WS}/ey-ai-finance/db/${APP_CHOICE}/schemas" \
            "${WS}/ey-ai-finance/db/schemas"
          do
            if [[ -d "${d}/forecasts" ]]; then
              SCHEMA_SRC="${d}"
              break
            fi
          done
          if [[ -z "${SCHEMA_SRC}" ]]; then
            FOUND=$(find "${WS}/ey-ai-finance" -type f -path '*/forecasts/create_schema.sql' 2>/dev/null | head -1 || true)
            if [[ -n "${FOUND}" ]]; then
              SCHEMA_SRC="$(dirname "$(dirname "${FOUND}")")"
            fi
          fi
          if [[ -n "${SCHEMA_SRC}" ]]; then
            sudo ln -sfn "${SCHEMA_SRC}" /schemas
            echo "Linked /schemas -> ${SCHEMA_SRC}"
          else
            echo "::error::Could not find schema SQL layout for \\i /schemas/... — expected a directory containing forecasts/ (e.g. ey-ai-finance/schemas or ey-ai-finance/db/${APP_CHOICE}/schemas) with forecasts/create_schema.sql. Commit those files in ey-ai-finance or change \\i to repo-relative paths."
            exit 1
          fi

          psql "host=${PG_HOST} port=5432 dbname=${PG_DB} user=citus sslmode=require" \
            -c "SELECT 1;" > /dev/null

          echo "Connection successful. Running init.sql..."

          psql "host=${PG_HOST} port=5432 dbname=${PG_DB} user=citus sslmode=require" \
            -v ON_ERROR_STOP=1 \
            -f "${INIT_SQL}"

          echo "Database initialization completed successfully."

      # aifinance-next only: classic aifinance init/schema does not use this POC tenant row step.
      - name: Insert POC tenant row
        if: ${{ inputs.appChoice != 'aifinance' }}
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          POC_SLUG: ${{ inputs.pocSlug }}
        run: |
          set -euo pipefail
          PG_HOST="${{ needs.deploy-main-resources.outputs.postgresHost }}"
          PG_DB="${{ needs.deploy-main-resources.outputs.postgresDatabaseName }}"

          POC_SQL_ESC=$(printf '%s' "$POC_SLUG" | sed "s/'/''/g")

          echo "Inserting tenant row for pocSlug=${POC_SLUG}"

          psql "host=${PG_HOST} port=5432 dbname=${PG_DB} user=citus sslmode=require" \
            -v ON_ERROR_STOP=1 <<SQL
          INSERT INTO tenant (id, name, storage_path, created_at, updated_at, is_active, metadata)
          SELECT s.next_id, '${POC_SQL_ESC}', '${POC_SQL_ESC}', t.ts, t.ts, true, NULL
          FROM (SELECT COALESCE(MAX(id), 0) + 1 AS next_id FROM tenant) AS s
          CROSS JOIN (
            SELECT date_trunc('microsecond', clock_timestamp())::timestamp(6) AS ts
          ) AS t;
          SQL

          echo "POC tenant row inserted successfully."
      - name: Insert preapproved admin users
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          PG_HOST="${{ needs.deploy-main-resources.outputs.postgresHost }}"
          PG_DB="${{ needs.deploy-main-resources.outputs.postgresDatabaseName }}"

          psql "host=${PG_HOST} port=5432 dbname=${PG_DB} user=citus sslmode=require" \
            -v ON_ERROR_STOP=1 <<'SQL'
          INSERT INTO preapproved_users (email, is_admin)
          VALUES
            ('Amy.Feng.Chen@ey.com', true),
            ('Kayl.Murdough@ey.com', true),
            ('Nicole.Belans@ey.com', true),
            ('Lucas.Benson@ey.com', true),
            ('Christian.J.Noordover@ey.com', true)
          ON CONFLICT (email) DO UPDATE SET is_admin = EXCLUDED.is_admin;
          SQL

          echo "Preapproved admin users upserted successfully."

  build-frontend-image:
    name: build and push frontend image
    if: ${{ inputs.buildFrontendImage }}
    needs: validate-secrets
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      REGISTRY: creyaifinmain.azurecr.io
    outputs:
      image_tag: ${{ inputs.pocSlug }}
      frontend_image_docker: ${{ steps.bicep_image.outputs.value }}
    steps:
      - name: Resolve image name and Dockerfile
        id: meta
        env:
          APP: ${{ inputs.appChoice }}
        run: |
          set -euo pipefail
          REGISTRY="creyaifinmain.azurecr.io"
          case "${APP}" in
            aifinance-next)
              IMAGE_NAME=aifinance-next-frontend
              BACKEND_IMAGE_NAME=aifinance-next-backend
              DOCKERFILE=ey-ai-finance/apps/aifinance-next/frontend/Dockerfile
              ;;
            aifinance)
              IMAGE_NAME=aifinance-frontend
              BACKEND_IMAGE_NAME=aifinance-backend
              DOCKERFILE=ey-ai-finance/apps/aifinance/frontend/Dockerfile
              ;;
            *)
              echo "::error::Unknown appChoice: ${APP} (expected aifinance-next or aifinance)"
              exit 1
              ;;
          esac
          {
            echo "image_name=${IMAGE_NAME}"
            echo "dockerfile=${DOCKERFILE}"
            echo "default_frontend_image=DOCKER|${REGISTRY}/${IMAGE_NAME}:latest"
            echo "default_backend_image=DOCKER|${REGISTRY}/${BACKEND_IMAGE_NAME}:latest"
          } >> "${GITHUB_OUTPUT}"
          echo "Default image refs for appChoice=${APP}: ${REGISTRY}/${IMAGE_NAME}:latest (frontend), ${REGISTRY}/${BACKEND_IMAGE_NAME}:latest (backend)"

      - name: Checkout ey-ai-finance
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.repository_owner }}/ey-ai-finance
          path: ey-ai-finance
          token: ${{ secrets.EY_AI_FINANCE_REPO_TOKEN }}

      - name: Free up disk space
        run: |
          echo "Before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo apt-get clean
          echo "After removing software:"
          df -h
          docker system prune -af --volumes || true
          docker builder prune -af || true
          echo "After Docker cleanup:"
          df -h

      - name: Set NEXT_PUBLIC_BACKEND_ENDPOINT_BASE
        id: ctx
        env:
          POC_SLUG: ${{ inputs.pocSlug }}
        run: |
          set -euo pipefail
          BASE="https://eyaifinance-backend-${POC_SLUG}.azurewebsites.net"
          echo "backend_base=${BASE}" >> "${GITHUB_OUTPUT}"

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_POC_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_POC_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_POC_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "${REGISTRY%%.azurecr.io}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0 (Node 24)

      - name: Build and push
        env:
          DOCKERFILE: ${{ steps.meta.outputs.dockerfile }}
          IMAGE_NAME: ${{ steps.meta.outputs.image_name }}
          POC_SLUG: ${{ inputs.pocSlug }}
          BACKEND_BASE: ${{ steps.ctx.outputs.backend_base }}
        run: |
          set -euo pipefail
          TAG="${REGISTRY}/${IMAGE_NAME}:${POC_SLUG}"
          CACHE_REF="${REGISTRY}/cache:${IMAGE_NAME}"
          docker buildx build \
            --file "${DOCKERFILE}" \
            --tag "${TAG}" \
            --push \
            --build-arg "NEXT_PUBLIC_BACKEND_ENDPOINT_BASE=${BACKEND_BASE}" \
            --cache-from "type=registry,ref=${CACHE_REF}" \
            --cache-to "type=registry,ref=${CACHE_REF},mode=max" \
            --provenance=false \
            --sbom=false \
            ey-ai-finance

      - name: Expose image for deploy-app-services
        id: bicep_image
        env:
          INAME: ${{ steps.meta.outputs.image_name }}
          POC_TAG: ${{ inputs.pocSlug }}
        run: |
          echo "value=DOCKER|${REGISTRY}/${INAME}:${POC_TAG}" >> "${GITHUB_OUTPUT}"
          echo "Pushed ${REGISTRY}/${INAME}:${POC_TAG}"
          echo "NEXT_PUBLIC_BACKEND_ENDPOINT_BASE=${{ steps.ctx.outputs.backend_base }}"

      - name: Azure logout
        if: always()
        run: az logout || true

  deploy-app-services:
    runs-on: ubuntu-latest
    needs: [deploy-main-resources, init-postgres, build-frontend-image]
    if: ${{ always() && needs.deploy-main-resources.result == 'success' && (needs.init-postgres.result == 'success' || needs.init-postgres.result == 'failure') && (needs.build-frontend-image.result == 'success' || needs.build-frontend-image.result == 'skipped') }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Warn when Postgres init did not succeed
        if: needs.init-postgres.result != 'success'
        run: |
          echo "::warning::Job init-postgres ended with result=${{ needs.init-postgres.result }}. Deploying App Services anyway — fix init.sql / tenant / preapproved_users by applying SQL manually."

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_POC_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_POC_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_POC_SUBSCRIPTION_ID }}

      - name: Resolve container images for deploy
        id: deploy_images
        env:
          BUILD_JOB_RESULT: ${{ needs.build-frontend-image.result }}
          FROM_BUILD: ${{ needs.build-frontend-image.outputs.frontend_image_docker }}
          FE_INPUT: ${{ inputs.frontendImage }}
          BE_INPUT: ${{ inputs.backendImage }}
          APP: ${{ inputs.appChoice }}
        run: |
          set -euo pipefail
          trim() { printf '%s' "$1" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'; }
          FE_IN=$(trim "${FE_INPUT:-}")
          BE_IN=$(trim "${BE_INPUT:-}")

          case "${APP}" in
            aifinance-next)
              DEF_FE="DOCKER|creyaifinmain.azurecr.io/aifinance-next-frontend:latest"
              DEF_BE="DOCKER|creyaifinmain.azurecr.io/aifinance-next-backend:latest"
              ;;
            aifinance)
              DEF_FE="DOCKER|creyaifinmain.azurecr.io/aifinance-frontend:latest"
              DEF_BE="DOCKER|creyaifinmain.azurecr.io/aifinance-backend:latest"
              ;;
            *)
              echo "::error::Unknown appChoice: ${APP} (expected aifinance-next or aifinance)"
              exit 1
              ;;
          esac

          # Successful build output wins over frontendImage input; input is for skip/fallback paths.
          if [[ "${BUILD_JOB_RESULT}" == "success" ]]; then
            FE_OUT="${FROM_BUILD}"
          elif [[ -n "${FE_IN}" ]]; then
            FE_OUT="${FE_IN}"
          else
            FE_OUT="${DEF_FE}"
          fi

          if [[ -n "${BE_IN}" ]]; then
            BE_OUT="${BE_IN}"
          else
            BE_OUT="${DEF_BE}"
          fi

          echo "frontend_image=${FE_OUT}" >> "${GITHUB_OUTPUT}"
          echo "backend_image=${BE_OUT}" >> "${GITHUB_OUTPUT}"
          echo "Resolved frontend (for deploy): ${FE_OUT}"
          echo "Resolved backend (for deploy): ${BE_OUT}"

      - name: Deploy app services
        env:
          FRONTEND_IMAGE: ${{ steps.deploy_images.outputs.frontend_image }}
          BACKEND_IMAGE: ${{ steps.deploy_images.outputs.backend_image }}
          MICROSOFT_PROVIDER_AUTHENTICATION_APP_ID: ${{ secrets.MICROSOFT_PROVIDER_AUTHENTICATION_APP_ID }}
          MICROSOFT_PROVIDER_AUTHENTICATION_SECRET: ${{ secrets.MICROSOFT_PROVIDER_AUTHENTICATION_SECRET }}
          AZURE_POC_TENANT_ID: ${{ secrets.AZURE_POC_TENANT_ID }}
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          MONGO_PASSWORD: ${{ secrets.MONGO_ADMIN_PASSWORD }}
          CREATE_AZURE_OPENAI: ${{ inputs.createAzureOpenAiResource }}
          AZURE_OPENAI_ACCOUNT_NAME: ${{ secrets.AZURE_OPENAI_ACCOUNT_NAME }}
          AZURE_OPENAI_ACCOUNT_SECRET: ${{ secrets.AZURE_OPENAI_ACCOUNT_SECRET }}
        run: |
          set -euo pipefail
          echo "Frontend container image: ${FRONTEND_IMAGE}"
          echo "Backend container image: ${BACKEND_IMAGE}"
          RG="${{ needs.deploy-main-resources.outputs.resourceGroupName }}"
          KV="${{ needs.deploy-main-resources.outputs.keyVaultName }}"
          APP_CFG="${{ needs.deploy-main-resources.outputs.appConfigEndpoint }}"
          POC_SLUG="${{ inputs.pocSlug }}"
          FRONTEND_BASE="https://eyaifinance-${POC_SLUG}.azurewebsites.net"

          MS_APP_ID="${MICROSOFT_PROVIDER_AUTHENTICATION_APP_ID}"
          MS_TENANT="${AZURE_POC_TENANT_ID}"
          MS_SECRET="${MICROSOFT_PROVIDER_AUTHENTICATION_SECRET}"
          FRONTEND_AUTH_BASE="$FRONTEND_BASE"
          echo "Microsoft Entra: Easy Auth on frontend (MICROSOFT_PROVIDER_CLIENT_SECRET on frontend plus shared App Config / Key Vault)."

          PG_HOST="${{ needs.deploy-main-resources.outputs.postgresHost }}"
          PG_DB="${{ needs.deploy-main-resources.outputs.postgresDatabaseName }}"

          MONGO_HOST="${{ needs.deploy-main-resources.outputs.mongoHost }}"
          MONGO_USER="${{ needs.deploy-main-resources.outputs.mongoAdministratorLogin }}"
          MONGO_PW_ENC=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$MONGO_PASSWORD")
          MONGO_CONN="mongodb+srv://${MONGO_USER}:${MONGO_PW_ENC}@${MONGO_HOST}/?tls=true&authMechanism=SCRAM-SHA-256&retrywrites=false&maxIdleTimeMS=120000&authSource=admin"

          # Backend OPENAI_ACCOUNT_EUS2: compact JSON array of two JSON strings — ["<accountName>","<apiKey>"].
          if [[ "$CREATE_AZURE_OPENAI" == "true" ]]; then
            OPENAI_NAME="${{ needs.deploy-main-resources.outputs.openaiName }}"
            OAI_KEY=$(az cognitiveservices account keys list --name "$OPENAI_NAME" --resource-group "$RG" --query key1 -o tsv)
            OPENAI_ACCOUNT_EUS2_JSON=$(OPENAI_N="$OPENAI_NAME" OPENAI_K="$OAI_KEY" python3 -c 'import json, os; print(json.dumps([os.environ["OPENAI_N"], os.environ["OPENAI_K"]], separators=(",", ":")))')
            echo "Backend OPENAI_ACCOUNT_EUS2: JSON string array from new POC OpenAI resource (name=$OPENAI_NAME, key redacted)."
          elif [[ -n "${AZURE_OPENAI_ACCOUNT_NAME:-}" && -n "${AZURE_OPENAI_ACCOUNT_SECRET:-}" ]]; then
            OPENAI_ACCOUNT_EUS2_JSON=$(OPENAI_N="$AZURE_OPENAI_ACCOUNT_NAME" OPENAI_K="$AZURE_OPENAI_ACCOUNT_SECRET" python3 -c 'import json, os; print(json.dumps([os.environ["OPENAI_N"], os.environ["OPENAI_K"]], separators=(",", ":")))')
            echo "Backend OPENAI_ACCOUNT_EUS2: JSON string array from AZURE_OPENAI_ACCOUNT_NAME + AZURE_OPENAI_ACCOUNT_SECRET (key redacted)."
          else
            OPENAI_ACCOUNT_EUS2_JSON=""
            echo "Skipping OPENAI_ACCOUNT_EUS2 (no POC OpenAI deploy; set AZURE_OPENAI_ACCOUNT_NAME and AZURE_OPENAI_ACCOUNT_SECRET to use a shared account)."
          fi
          OPENAI_PARAM_FILE=$(mktemp)
          trap 'rm -f "$OPENAI_PARAM_FILE"' EXIT
          jq -n \
            --arg oai "$OPENAI_ACCOUNT_EUS2_JSON" \
            --arg mongo "$MONGO_CONN" \
            '{parameters: {openAiAccountEus2Json: {value: $oai}, mongoConnStr: {value: $mongo}}}' > "$OPENAI_PARAM_FILE"
          echo "Backend MONGO_CONN_STR: same URI shape as Key Vault MongoConnectionString (password redacted)."

          az deployment group create \
            --resource-group "$RG" \
            --template-file bicep/appservices-stack.bicep \
            --parameters \
              pocSlug=${{ inputs.pocSlug }} \
              location=${{ inputs.location }} \
              keyVaultName="$KV" \
              appConfigEndpoint="$APP_CFG" \
              frontendImage="$FRONTEND_IMAGE" \
              backendImage="$BACKEND_IMAGE" \
              acrManagedIdentityClientId='${{ secrets.ACR_MANAGED_IDENTITY_CLIENT_ID }}' \
              microsoftIdentityClientId="$MS_APP_ID" \
              microsoftIdentityTenantId="$MS_TENANT" \
              microsoftIdentityClientSecret="$MS_SECRET" \
              frontendPublicBaseUrl="$FRONTEND_AUTH_BASE" \
              frontendHealthCheckPath='/api/health' \
              backendHealthCheckPath='/health' \
              postgresHost="$PG_HOST" \
              postgresDatabaseName="$PG_DB" \
              postgresUser='citus' \
              postgresPort='5432' \
              postgresPassword="$POSTGRES_ADMIN_PASSWORD" \
            --parameters @"$OPENAI_PARAM_FILE"

      - name: Restrict Blob Storage to Web App outbound IPs
        run: |
          set -euo pipefail
          RG="${{ needs.deploy-main-resources.outputs.resourceGroupName }}"
          POC_SLUG="${{ inputs.pocSlug }}"
          ST_NAME="${{ needs.deploy-main-resources.outputs.storageAccountName }}"
          FE_APP="eyaifinance-${POC_SLUG}"
          BE_APP="eyaifinance-backend-${POC_SLUG}"

          echo "Collecting possibleOutboundIpAddresses for ${FE_APP} and ${BE_APP} (superset used when the plan scales)."
          FE_IPS=$(az webapp show --resource-group "$RG" --name "$FE_APP" --query possibleOutboundIpAddresses -o tsv)
          BE_IPS=$(az webapp show --resource-group "$RG" --name "$BE_APP" --query possibleOutboundIpAddresses -o tsv)
          export MERGED="${FE_IPS},${BE_IPS}"

          RULES_JSON=$(python3 -c "
          import json, os
          merged = os.environ.get('MERGED', '')
          ips = sorted({p.strip() for p in merged.split(',') if p.strip()})
          if not ips:
              raise SystemExit('No outbound IPs from Web Apps; refusing to set defaultAction Deny on storage')
          # possibleOutboundIpAddresses are plain IPv4 hosts; Storage accepts host or CIDR — see https://github.com/Azure/azure-powershell/issues/25455
          rules = [{'value': ip} for ip in ips]
          print(json.dumps(rules))
          ")

          SUB=$(az account show --query id -o tsv)
          RULE_COUNT=$(echo "$RULES_JSON" | jq 'length')

          # --- Storage account (blob data plane): ipRules require action Allow per ARM schema ---
          ST_API_VER="2024-01-01"
          ST_RES_ID="/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.Storage/storageAccounts/${ST_NAME}"
          ST_URL="https://management.azure.com${ST_RES_ID}?api-version=${ST_API_VER}"
          ST_BODY=$(jq -n \
            --argjson rules "$RULES_JSON" \
            '{
              properties: {
                publicNetworkAccess: "Enabled",
                networkAcls: {
                  defaultAction: "Deny",
                  bypass: "AzureServices",
                  virtualNetworkRules: [],
                  ipRules: ($rules | map(. + {action: "Allow"}))
                }
              }
            }')

          echo "Patching storage account ${ST_NAME}: defaultAction Deny, ${RULE_COUNT} IP rule(s), bypass AzureServices."
          az rest --method patch --url "$ST_URL" --headers "Content-Type=application/json" --body "$ST_BODY"
          echo "Blob storage network ACLs updated. Data-plane access is limited to the listed IPs (plus AzureServices bypass)."
