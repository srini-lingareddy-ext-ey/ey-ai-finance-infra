# Test: deploy one Key Vault and set one secret.
# Uses same OIDC managed identity as Deploy POC (id-aifinance-poc-deploy).
# Secrets: AZURE_POC_CLIENT_ID, AZURE_POC_TENANT_ID, AZURE_POC_SUBSCRIPTION_ID, AZURE_POC_PIPELINE_PRINCIPAL_ID.

name: Test Key Vault

on:
  workflow_dispatch:
    inputs:
      name:
        description: "Short name for resource group and Key Vault (e.g. mytest)"
        required: true
        type: string
      secretKey:
        description: "Name of the secret to create in the vault"
        required: true
        type: string
      secretValue:
        description: "Value to store for the secret"
        required: true
        type: string

env:
  AZURE_CLIENT_ID: ${{ secrets.AZURE_POC_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_POC_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_POC_SUBSCRIPTION_ID }}

jobs:
  test-keyvault:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_POC_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_POC_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_POC_SUBSCRIPTION_ID }}

      - name: Debug — workflow inputs and context
        run: |
          echo "::group::Workflow inputs and context"
          echo "input name: ${{ inputs.name }}"
          echo "input secretKey: ${{ inputs.secretKey }}"
          echo "input secretValue: (redacted, not logged)"
          echo "github.run_id: ${{ github.run_id }}"
          echo "github.run_number: ${{ github.run_number }}"
          echo "::endgroup::"
          echo "::group::Azure context"
          az account show --query "{subscriptionId:id, name:name, user:user.name}" -o table 2>/dev/null || true
          echo "::endgroup::"

      - name: Create resource group and Key Vault
        id: create-kv
        run: |
          NAME="${{ inputs.name }}"
          # Sanitize name for Key Vault (alphanumeric and hyphen only); keep short for 3-24 char limit
          SAFE_NAME=$(echo "$NAME" | sed 's/[^a-zA-Z0-9-]//g' | cut -c1-10)
          SUFFIX="${{ github.run_number }}"
          VAULT_NAME="kv-${SAFE_NAME}-${SUFFIX}"
          RG_NAME="rg-kv-test-${NAME}"
          LOCATION="eastus"

          echo "::group::Debug — computed names"
          echo "NAME=$NAME"
          echo "SAFE_NAME=$SAFE_NAME"
          echo "VAULT_NAME=$VAULT_NAME"
          echo "RG_NAME=$RG_NAME"
          echo "LOCATION=$LOCATION"
          echo "::endgroup::"

          az group create --name "$RG_NAME" --location "$LOCATION" --output none
          echo "Created resource group: $RG_NAME"

          if ! az keyvault create \
            --name "$VAULT_NAME" \
            --resource-group "$RG_NAME" \
            --location "$LOCATION" \
            --enable-rbac-authorization true \
            --output none; then
            KV_EXIT=$?
            if az keyvault show --name "$VAULT_NAME" --resource-group "$RG_NAME" &>/dev/null; then
              echo "Key Vault $VAULT_NAME already exists; continuing."
            else
              exit $KV_EXIT
            fi
          else
            echo "Created Key Vault: $VAULT_NAME"
          fi

          echo "vaultName=$VAULT_NAME" >> $GITHUB_OUTPUT
          echo "resourceGroup=$RG_NAME" >> $GITHUB_OUTPUT

      - name: Grant identity access to Key Vault
        run: |
          VAULT_NAME="${{ steps.create-kv.outputs.vaultName }}"
          RG_NAME="${{ steps.create-kv.outputs.resourceGroup }}"
          PRINCIPAL_ID="${{ secrets.AZURE_POC_PIPELINE_PRINCIPAL_ID }}"
          SCOPE="/subscriptions/${{ env.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${RG_NAME}/providers/Microsoft.KeyVault/vaults/${VAULT_NAME}"
          echo "::debug::Assigning Key Vault Secrets Officer to vault scope"
          echo "Scope: $SCOPE"
          # Key Vault Secrets Officer: set/get secrets
          az role assignment create \
            --role "Key Vault Secrets Officer" \
            --assignee "$PRINCIPAL_ID" \
            --scope "$SCOPE" \
            --output none
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            EXISTING=$(az role assignment list --scope "$SCOPE" --assignee "$PRINCIPAL_ID" --query "[?roleDefinitionName=='Key Vault Secrets Officer'].id" -o tsv 2>/dev/null)
            if [ -n "$EXISTING" ]; then
              echo "Role assignment already exists for vault: $VAULT_NAME"
              exit 0
            fi
            exit $EXIT_CODE
          fi
          echo "Role assignment created for vault: $VAULT_NAME"

      - name: Wait for RBAC propagation
        run: |
          echo "Waiting 30s for RBAC propagation..."
          sleep 30

      - name: Set secret
        run: |
          VAULT_NAME="${{ steps.create-kv.outputs.vaultName }}"
          SECRET_KEY="${{ inputs.secretKey }}"
          echo "Setting secret '$SECRET_KEY' in vault '$VAULT_NAME'..."
          az keyvault secret set \
            --vault-name "$VAULT_NAME" \
            --name "$SECRET_KEY" \
            --value "${{ inputs.secretValue }}" \
            --output none
          echo "Secret '$SECRET_KEY' set in vault $VAULT_NAME."
